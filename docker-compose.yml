services:
  postgres:
    image: postgres:16-alpine
    container_name: open-business-os-postgres
    environment:
      POSTGRES_DB: open_business_os
      POSTGRES_USER: open_business_os
      POSTGRES_PASSWORD: open_business_os_dev
    ports:
      - "5432:5432"
    volumes:
      - open_business_os_pgdata:/var/lib/postgresql/data
      - ./packages/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_business_os -d open_business_os"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  open_business_os_pgdata:

